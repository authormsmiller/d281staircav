backend:
  name: local
  branch: main

media_folder: "site/soldiers"
public_folder: "/soldiers"

# Enable Netlify Identity for login
local_backend: true

collections:

  # ── SOLDIER PROFILES ──────────────────────────────
  - name: "soldiers"
    label: "Soldier Profiles"
    label_singular: "Soldier Profile"
    folder: "site/soldiers"
    create: true
    slug: "{{slug}}/{{slug}}"
    media_folder: "{{slug}}/photos"
    public_folder: "{{slug}}/photos"
    identifier_field: "title"
    summary: "{{last_name}}, {{first_name}} — {{rank}} · {{platoon}}"
    fields:

      # Auto-generated
      - { label: "Page Title", name: "title", widget: "string",
          hint: "e.g. SGT Marvin Dale Miller — used in browser tab" }

      - { label: "Slug (URL)", name: "slug", widget: "string",
          hint: "Use lastname-firstname format, all lowercase, hyphens only. e.g. miller-marvin-dale",
          pattern: ['^[a-z0-9-]+$', "Lowercase letters, numbers, and hyphens only"] }

      # Identity
      - label: "Identity"
        name: "identity"
        widget: "object"
        collapsed: false
        fields:
          - { label: "First Name", name: "first_name", widget: "string" }
          - { label: "Middle Name", name: "middle_name", widget: "string", required: false }
          - { label: "Last Name", name: "last_name", widget: "string" }
          - { label: 'In-Country Nickname (e.g. "Ski", "Buck")', name: "nickname",
              widget: "string", required: false }
          - label: "Rank"
            name: "rank"
            widget: "select"
            options:
              - "Private (PVT)"
              - "Private First Class (PFC)"
              - "Specialist / SP4"
              - "Corporal (CPL)"
              - "Sergeant (SGT)"
              - "Staff Sergeant (SSG)"
              - "Sergeant First Class (SFC)"
              - "Master Sergeant (MSG)"
              - "First Sergeant (1SG)"
              - "2nd Lieutenant (2LT)"
              - "1st Lieutenant (1LT)"
              - "Captain (CPT)"
              - "Major (MAJ)"
              - "Unknown"
          - { label: "MOS / Job", name: "mos", widget: "string",
              hint: "e.g. 11F40 · Recon", required: false }
          - { label: "Platoon", name: "platoon", widget: "string",
              hint: "e.g. Cat (Wild Cat) Platoon · 3rd" }

      # Service
      - label: "Service"
        name: "service"
        widget: "object"
        collapsed: false
        fields:
          - { label: "Arrived In-Country", name: "arrived", widget: "string",
              hint: "e.g. 4 Dec 1970" }
          - { label: "Departed In-Country", name: "departed", widget: "string",
              hint: "e.g. 2 Dec 1971" }
          - { label: "Home of Record", name: "hometown", widget: "string",
              hint: "e.g. Kittanning, Armstrong Co., PA" }
          - label: "Character of Service"
            name: "character_of_service"
            widget: "select"
            default: "Honorable"
            options: ["Honorable", "General", "Other Than Honorable", "Unknown"]
          - label: "Status"
            name: "status"
            widget: "select"
            options: ["Living", "Deceased", "KIA", "Unknown"]
          - { label: "Year Deceased (if applicable)", name: "year_deceased",
              widget: "string", required: false }

      # Profile photo
      - { label: "Profile Photo Filename",
          name: "profile_photo",
          widget: "string",
          hint: "Filename only, e.g. miller-001.jpg — must be in this soldier's photos folder",
          required: false }

      # Decorations
      - label: "Decorations & Awards"
        name: "decorations"
        widget: "list"
        required: false
        hint: "Add one award per line"
        field: { label: "Award", name: "award", widget: "string" }

      - label: "Distinguished Decorations (shown in yellow)"
        name: "distinguished_decorations"
        widget: "list"
        required: false
        hint: "List awards that should be highlighted — must match exactly what you typed above"
        field: { label: "Award", name: "award", widget: "string" }

      # Family contact
      - { label: "Show Contact Family button", name: "family_contact",
          widget: "boolean", default: false }

      # Timeline
      - { label: "Timeline Source Note", name: "timeline_source",
          widget: "text", required: false,
          hint: "Brief note about where the timeline comes from — shown in italics above the timeline" }

      - label: "Service Timeline"
        name: "timeline"
        widget: "list"
        required: false
        summary: "{{fields.date}} — {{fields.headline}}"
        fields:
          - { label: "Date", name: "date", widget: "string", hint: "e.g. 20 Apr 1971" }
          - label: "Event Type"
            name: "type"
            widget: "select"
            options:
              - { label: "Movement / Administrative", value: "move" }
              - { label: "Combat", value: "combat" }
              - { label: "Personal / Morale", value: "personal" }
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Body", name: "body", widget: "text" }
          - { label: "Source Conflict Notice", name: "source_notice",
              widget: "text", required: false,
              hint: "Add this if multiple conflicting accounts exist for this event" }

      # Photos
      - { label: "Photo Intro Text", name: "photo_intro", widget: "text", required: false }
      - { label: "Show Wartime Content Notice", name: "wartime_content_notice",
          widget: "boolean", default: false }

      - label: "Photos"
        name: "photos"
        widget: "list"
        required: false
        summary: "{{fields.filename}}"
        fields:
          - { label: "Filename", name: "filename", widget: "string",
              hint: "e.g. miller-001.jpg — must be in this soldier's photos folder" }
          - label: "Photographer"
            name: "photographer"
            widget: "select"
            default: "subject"
            options:
              - { label: "Taken by this soldier", value: "subject" }
              - { label: "Taken of this soldier (unknown photographer)", value: "unknown-of" }
              - { label: "Taken of this soldier (known photographer)", value: "known-of" }
          - { label: "Full Caption", name: "caption", widget: "text" }
          - { label: "Short Caption (overlay text)", name: "caption_short",
              widget: "string", required: false }
          - { label: "Credit Line", name: "credit", widget: "string",
              hint: "e.g. Photographed by Marvin D. Miller · April 1971" }
          - { label: "Wide layout (spans 2 columns)", name: "wide",
              widget: "boolean", default: false }

      # Documents
      - label: "Documents & Records"
        name: "documents"
        widget: "list"
        required: false
        summary: "{{fields.title}}"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Metadata line", name: "meta", widget: "string",
              hint: "e.g. Official Record · US Army · 2 December 1971" }
          - { label: "Note (optional quote or annotation)", name: "note",
              widget: "string", required: false }
          - label: "Type"
            name: "type"
            widget: "select"
            options: ["Official", "Personal", "Press", "Compiled", "Other"]
          - { label: "Icon", name: "icon", widget: "string",
              default: "📄", required: false }

      # Brothers
      - label: "Served Alongside"
        name: "brothers"
        widget: "list"
        required: false
        summary: "{{fields.name}}"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Platoon", name: "platoon", widget: "string" }
          - { label: "Dates", name: "dates", widget: "string",
              hint: "e.g. 1970–71" }
          - { label: "Status", name: "status", widget: "string",
              hint: "e.g. Deceased, Archive Contributor, Living" }
          - { label: "KIA", name: "kia", widget: "boolean", default: false }

  # ── SITE SETTINGS ─────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Global Settings"
        name: "site"
        file: "site/_data/site.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Unit Name", name: "unit", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }
